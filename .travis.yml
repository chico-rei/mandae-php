language: php

dist: jammy

matrix:
  include:
  - php: 8.2
    env: ANALYSIS='true'
  - php: 8.2
    env: COMPOSER_ARGS='--prefer-lowest'
  - php: 8.3
  - php: 8.4
  - php: nightly
  allow_failures:
  - php: nightly

before_script:
- composer update $COMPOSER_ARGS

script:
- mkdir -p build/logs
- php vendor/bin/phpunit -c phpunit.xml.dist
- if [[ "$ANALYSIS" == 'true' ]]; then php vendor/bin/phpcs ; fi

after_success:
- if [[ "$ANALYSIS" == 'true' ]]; then php vendor/bin/coveralls -v -r /home/travis/build/chico-rei/mandae-php/ ; fi
